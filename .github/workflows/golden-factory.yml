name: 🏭 Golden Toolchain Factory (V9 - Target Dir Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (Решают 99% проблем с путями)
env:
  OSXCROSS_ROOT: "/opt/osxcross"
  # ВОТ ОНА - строчка, которая лечит ошибку "Cannot determine OSXCROSS_TARGET_DIR"
  OSXCROSS_TARGET_DIR: "/opt/osxcross" 
  OSXCROSS_HOST: "x86_64-apple-darwin19"
  MACOSX_DEPLOYMENT_TARGET: "10.13"

jobs:
  build-golden:
    runs-on: ubuntu-22.04
    env:
      # Прописываем PATH глобально для всей Job! Линковщик теперь точно не потеряется.
      PATH: /opt/osxcross/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      
    steps:
      - name: 🚀 Deploy Toolchain
        run: |
          sudo mkdir -p /opt/osxcross
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C /opt/osxcross --strip-components=1
          
          sudo mkdir -p /opt/osxcross/deps
          sudo chown -R $USER:$USER /opt/osxcross

      - name: 🔧 Install Host Tools
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential git

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: ZLIB (Хитрая сборка только статики)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build ZLIB (Static Only)
        run: |
          git clone --depth 1 https://github.com/madler/zlib.git zlib_src
          mkdir -p zlib_src/build && cd zlib_src/build
          
          # Тулчейн теперь сработает, так как OSXCROSS_TARGET_DIR задан глобально
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/opt/osxcross/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=/opt/osxcross/deps
          
          # Собираем ТОЛЬКО статическую либу, игнорируя динамическую
          make zlibstatic
          
          # Копируем результаты руками
          mkdir -p /opt/osxcross/deps/lib /opt/osxcross/deps/include
          cp libz.a /opt/osxcross/deps/lib/
          cp zconf.h /opt/osxcross/deps/include/
          cp ../zlib.h /opt/osxcross/deps/include/

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3: LIBPNG
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build LIBPNG
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git png_src
          mkdir -p png_src/build && cd png_src/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/opt/osxcross/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=/opt/osxcross/deps \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF \
            -DZLIB_ROOT=/opt/osxcross/deps
            
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: FREETYPE
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build FREETYPE
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git ft_src
          mkdir -p ft_src/build && cd ft_src/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/opt/osxcross/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=/opt/osxcross/deps \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=/opt/osxcross/deps
            
          make -j$(nproc) install

      - name: 📦 Pack Golden Image
        run: |
          cd /opt
          tar -cJf osxcross-golden-v9.tar.xz osxcross/

      - name: 🚀 Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: golden-v9.0
          name: "Golden Toolchain V9"
          files: /opt/osxcross-golden-v9.tar.xz
