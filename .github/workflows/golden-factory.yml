name: 🏭 Golden Toolchain Factory (V11 - Hard Manual)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Четкие абсолютные пути
  BASE_DIR: "/opt/osxcross"
  # После нормальной распаковки всё будет здесь:
  SDK_DIR: "/opt/osxcross/SDK/MacOSX10.15.sdk"
  BIN_DIR: "/opt/osxcross/bin"
  DEPS_DIR: "/opt/osxcross/deps"
  TARGET: "x86_64-apple-darwin19"
  MACOS_MIN: "10.13"

jobs:
  build-golden:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚀 Deploy Toolchain (Fixing Structure)
        run: |
          sudo mkdir -p ${{ env.BASE_DIR }}
          # Распаковываем БЕЗ strip-components, чтобы сохранить структуру target/
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C /opt
          
          # Теперь гарантированно: бинарники в /opt/osxcross/bin, SDK в /opt/osxcross/SDK
          sudo mkdir -p ${{ env.DEPS_DIR }}
          sudo chown -R $USER:$USER ${{ env.BASE_DIR }}

      - name: 🔧 Install Host Tools
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential git

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: ZLIB (Полностью ручные флаги, игнорируем врапперы)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build ZLIB
        run: |
          git clone --depth 1 https://github.com/madler/zlib.git zlib_src
          mkdir -p zlib_src/build && cd zlib_src/build
          
          # Мы не используем toolchain.cmake. Мы всё пишем руками.
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_C_COMPILER=${{ env.BIN_DIR }}/${{ env.TARGET }}-clang \
            -DCMAKE_C_FLAGS="-target ${{ env.TARGET }} --sysroot=${{ env.SDK_DIR }} -mmacosx-version-min=${{ env.MACOS_MIN }}" \
            -DCMAKE_AR=${{ env.BIN_DIR }}/${{ env.TARGET }}-ar \
            -DCMAKE_RANLIB=${{ env.BIN_DIR }}/${{ env.TARGET }}-ranlib \
            -DCMAKE_INSTALL_PREFIX=${{ env.DEPS_DIR }} \
            -DBUILD_SHARED_LIBS=OFF
          
          make -j$(nproc) zlibstatic
          
          # Ручная инсталляция, чтобы не зависеть от логики 'make install'
          mkdir -p ${{ env.DEPS_DIR }}/lib ${{ env.DEPS_DIR }}/include
          cp libz.a ${{ env.DEPS_DIR }}/lib/
          cp zconf.h ${{ env.DEPS_DIR }}/include/
          cp ../zlib.h ${{ env.DEPS_DIR }}/include/

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3: LIBPNG
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build LIBPNG
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git png_src
          mkdir -p png_src/build && cd png_src/build
          
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_C_COMPILER=${{ env.BIN_DIR }}/${{ env.TARGET }}-clang \
            -DCMAKE_C_FLAGS="-target ${{ env.TARGET }} --sysroot=${{ env.SDK_DIR }} -mmacosx-version-min=${{ env.MACOS_MIN }} -I${{ env.DEPS_DIR }}/include" \
            -DCMAKE_EXE_LINKER_FLAGS="-L${{ env.DEPS_DIR }}/lib" \
            -DCMAKE_AR=${{ env.BIN_DIR }}/${{ env.TARGET }}-ar \
            -DCMAKE_RANLIB=${{ env.BIN_DIR }}/${{ env.TARGET }}-ranlib \
            -DCMAKE_INSTALL_PREFIX=${{ env.DEPS_DIR }} \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF \
            -DZLIB_LIBRARY=${{ env.DEPS_DIR }}/lib/libz.a \
            -DZLIB_INCLUDE_DIR=${{ env.DEPS_DIR }}/include
            
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: FREETYPE
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build FREETYPE
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git ft_src
          mkdir -p ft_src/build && cd ft_src/build
          
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_C_COMPILER=${{ env.BIN_DIR }}/${{ env.TARGET }}-clang \
            -DCMAKE_C_FLAGS="-target ${{ env.TARGET }} --sysroot=${{ env.SDK_DIR }} -mmacosx-version-min=${{ env.MACOS_MIN }} -I${{ env.DEPS_DIR }}/include" \
            -DCMAKE_AR=${{ env.BIN_DIR }}/${{ env.TARGET }}-ar \
            -DCMAKE_RANLIB=${{ env.BIN_DIR }}/${{ env.TARGET }}-ranlib \
            -DCMAKE_INSTALL_PREFIX=${{ env.DEPS_DIR }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_DISABLE_FIND_PACKAGE_HarfBuzz=ON \
            -DZLIB_LIBRARY=${{ env.DEPS_DIR }}/lib/libz.a \
            -DZLIB_INCLUDE_DIR=${{ env.DEPS_DIR }}/include \
            -DPNG_LIBRARY=${{ env.DEPS_DIR }}/lib/libpng16.a \
            -DPNG_PNG_INCLUDE_DIR=${{ env.DEPS_DIR }}/include
            
          make -j$(nproc) install

      - name: 📦 Pack Golden Image
        run: |
          cd /opt
          tar -cJf osxcross-golden-v11.tar.xz osxcross/

      - name: 🚀 Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: golden-v11.0
          name: "Golden Toolchain V11 (Zero Hope)"
          files: /opt/osxcross-golden-v11.tar.xz
