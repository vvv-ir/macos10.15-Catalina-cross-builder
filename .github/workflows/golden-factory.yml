name: 🏭 Golden Toolchain Factory (V3 - Final)

on:
  push: 
  workflow_dispatch:

permissions:
  contents: write

env:
  # Основной корень, куда распакуется архив
  OSXCROSS_ROOT: "/opt/osxcross"
  # Тот самый путь, который требует toolchain.cmake внутри
  OSXCROSS_TARGET_DIR: "/opt/osxcross/target"
  TARGET_HOST: "x86_64-apple-darwin19"
  MACOS_MIN: "10.13"

jobs:
  build-golden:
    runs-on: ubuntu-22.04
    env:
      # Прокидываем бинарники тулчейна в PATH глобально
      PATH: /opt/osxcross/target/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Принудительно отключаем использование системных путей линукса для pkg-config
      PKG_CONFIG_LIBDIR: "/opt/osxcross/target/deps/lib/pkgconfig"
      PKG_CONFIG_SYSROOT_DIR: "/"

    steps:
      - name: 🚀 Deploy Base Toolchain (Correct Structure)
        run: |
          sudo mkdir -p ${{ env.OSXCROSS_ROOT }}
          # Скачиваем и распаковываем БЕЗ strip-components, чтобы сохранить структуру /target/
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C ${{ env.OSXCROSS_ROOT }}
          
          # Создаем папку для наших зависимостей внутри структуры тулчейна
          sudo mkdir -p ${{ env.OSXCROSS_TARGET_DIR }}/deps
          sudo chown -R $USER:$USER ${{ env.OSXCROSS_ROOT }}

      - name: 🔧 Install Host Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config build-essential git

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: ZLIB (Жесткая фиксация через CMake)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build ZLIB
        run: |
          git clone --depth 1 https://github.com/madler/zlib.git zlib_src
          mkdir -p zlib_src/build && cd zlib_src/build
          
          # Мы ВРУЧНУЮ передаем пути к компиляторам, чтобы CMake не имел шанса их потерять
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=${{ env.OSXCROSS_TARGET_DIR }}/deps \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN }} \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_TARGET_DIR }}/bin/${{ env.TARGET_HOST }}-clang \
            -DCMAKE_CXX_COMPILER=${{ env.OSXCROSS_TARGET_DIR }}/bin/${{ env.TARGET_HOST }}-clang++ \
            -DBUILD_SHARED_LIBS=OFF
            
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3: LIBPNG (Линкуем с уже собранным Zlib)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build LIBPNG
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git png_src
          mkdir -p png_src/build && cd png_src/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=${{ env.OSXCROSS_TARGET_DIR }}/deps \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_TARGET_DIR }}/bin/${{ env.TARGET_HOST }}-clang \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF \
            -DZLIB_ROOT=${{ env.OSXCROSS_TARGET_DIR }}/deps
            
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: FREETYPE
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build FREETYPE
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git ft_src
          mkdir -p ft_src/build && cd ft_src/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=${{ env.OSXCROSS_TARGET_DIR }}/deps \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_TARGET_DIR }}/bin/${{ env.TARGET_HOST }}-clang \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=${{ env.OSXCROSS_TARGET_DIR }}/deps
            
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 5: OPENJPEG
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build OPENJPEG
        run: |
          git clone --depth 1 https://github.com/uclouvain/openjpeg.git jp_src
          mkdir -p jp_src/build && cd jp_src/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=${{ env.OSXCROSS_TARGET_DIR }}/deps \
            -DCXC_COMPILER=${{ env.OSXCROSS_TARGET_DIR }}/bin/${{ env.TARGET_HOST }}-clang \
            -DBUILD_SHARED_LIBS=OFF
            
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 6: Упаковка и публикация (Теперь в правильной иерархии)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📦 Pack Golden Image
        run: |
          cd /opt
          tar -cJf osxcross-golden-v3.tar.xz osxcross/

      - name: 🚀 Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: golden-v3.0
          name: "Golden Toolchain V3 (Correct Pathing)"
          files: /opt/osxcross-golden-v3.tar.xz
