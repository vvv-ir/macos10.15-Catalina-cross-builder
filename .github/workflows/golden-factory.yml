name: 🏭 Golden Toolchain Factory (V8 - The True Path)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-golden:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚀 Deploy Toolchain
        run: |
          # 1. Разворачиваем архив с сохранением нужной структуры
          sudo mkdir -p /opt/osxcross
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C /opt/osxcross --strip-components=1
          
          # 2. Создаем "золотое хранилище"
          sudo mkdir -p /opt/osxcross/deps
          sudo chown -R $USER:$USER /opt/osxcross

      - name: 🔧 Install Host Tools
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential git

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: ZLIB (Статика + Обход сломанного make install)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build ZLIB (Static Only)
        run: |
          # КРИТИЧНО: Явно прописываем PATH, чтобы CMake и clang нашли Apple Linker
          export PATH="/opt/osxcross/bin:$PATH"
          export OSXCROSS_HOST="x86_64-apple-darwin19"
          export MACOSX_DEPLOYMENT_TARGET="10.13"
          
          git clone --depth 1 https://github.com/madler/zlib.git zlib_src
          mkdir -p zlib_src/build && cd zlib_src/build
          
          # Используем штатный тулчейн (теперь он отработает, так как есть PATH)
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/opt/osxcross/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=/opt/osxcross/deps
          
          # ХИТРОСТЬ: Собираем ТОЛЬКО статическую либу! 
          # Это предотвращает попытку собрать .dylib и ошибку '-dynamic'
          make zlibstatic
          
          # Вручную кладем "золото" на полку (вместо сломанного make install)
          mkdir -p /opt/osxcross/deps/lib /opt/osxcross/deps/include
          cp libz.a /opt/osxcross/deps/lib/
          cp zconf.h /opt/osxcross/deps/include/
          cp ../zlib.h /opt/osxcross/deps/include/

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3: LIBPNG
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build LIBPNG
        run: |
          export PATH="/opt/osxcross/bin:$PATH"
          export OSXCROSS_HOST="x86_64-apple-darwin19"
          export MACOSX_DEPLOYMENT_TARGET="10.13"
          
          git clone --depth 1 https://github.com/glennrp/libpng.git png_src
          mkdir -p png_src/build && cd png_src/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/opt/osxcross/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=/opt/osxcross/deps \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF \
            -DZLIB_ROOT=/opt/osxcross/deps
            
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: FREETYPE
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build FREETYPE
        run: |
          export PATH="/opt/osxcross/bin:$PATH"
          export OSXCROSS_HOST="x86_64-apple-darwin19"
          export MACOSX_DEPLOYMENT_TARGET="10.13"
          
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git ft_src
          mkdir -p ft_src/build && cd ft_src/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/opt/osxcross/toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=/opt/osxcross/deps \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=/opt/osxcross/deps
            
          make -j$(nproc) install

      - name: 📦 Pack Golden Image
        run: |
          cd /opt
          tar -cJf osxcross-golden-v8.tar.xz osxcross/

      - name: 🚀 Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: golden-v8.0
          name: "Golden Toolchain V8"
          files: /opt/osxcross-golden-v8.tar.xz
