name: 🏭 Golden Toolchain Factory (V7 - Back to Basics)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  OSXCROSS_ROOT: "/opt/osxcross"
  TARGET_HOST: "x86_64-apple-darwin19"
  MACOS_MIN: "10.13"

jobs:
  build-golden:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚀 Deploy & Normalize Toolchain
        run: |
          sudo mkdir -p ${{ env.OSXCROSS_ROOT }}
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C ${{ env.OSXCROSS_ROOT }}
          
          if [ -d "${{ env.OSXCROSS_ROOT }}/target" ]; then
            sudo mv ${{ env.OSXCROSS_ROOT }}/target/* ${{ env.OSXCROSS_ROOT }}/
          fi
          sudo mkdir -p ${{ env.OSXCROSS_ROOT }}/deps
          sudo chown -R $USER:$USER ${{ env.OSXCROSS_ROOT }}

      - name: 🔧 Install Host Tools
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential git

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: ZLIB через классический Configure (Никакого CMake!)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build ZLIB (Classic Way)
        run: |
          git clone --depth 1 https://github.com/madler/zlib.git zlib_src
          cd zlib_src
          
          # Указываем инструменты напрямую в переменные окружения
          export CHOST=${{ env.TARGET_HOST }}
          export CC="${{ env.OSXCROSS_ROOT }}/bin/${{ env.TARGET_HOST }}-clang"
          export AR="${{ env.OSXCROSS_ROOT }}/bin/${{ env.TARGET_HOST }}-ar"
          export RANLIB="${{ env.OSXCROSS_ROOT }}/bin/${{ env.TARGET_HOST }}-ranlib"
          export CFLAGS="-O3 -mmacosx-version-min=${{ env.MACOS_MIN }} -isysroot ${{ env.OSXCROSS_ROOT }}/SDK/MacOSX10.15.sdk"
          
          # --static заставит собрать только libz.a и не трогать dylib
          ./configure --prefix=${{ env.OSXCROSS_ROOT }}/deps --static
          
          make -j$(nproc)
          make install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3: LIBPNG (Используем наработки Zlib)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build LIBPNG
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git png_src
          cd png_src
          # Здесь используем CMake, но с ВЫКЛЮЧЕННЫМ shared
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_ROOT }}/bin/${{ env.TARGET_HOST }}-clang \
            -DCMAKE_OSX_SYSROOT=${{ env.OSXCROSS_ROOT }}/SDK/MacOSX10.15.sdk \
            -DCMAKE_INSTALL_PREFIX=${{ env.OSXCROSS_ROOT }}/deps \
            -DPNG_SHARED=OFF \
            -DPNG_TESTS=OFF \
            -DZLIB_ROOT=${{ env.OSXCROSS_ROOT }}/deps \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN }}
          
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: FREETYPE
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build FREETYPE
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git ft_src
          cd ft_src
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_ROOT }}/bin/${{ env.TARGET_HOST }}-clang \
            -DCMAKE_OSX_SYSROOT=${{ env.OSXCROSS_ROOT }}/SDK/MacOSX10.15.sdk \
            -DCMAKE_INSTALL_PREFIX=${{ env.OSXCROSS_ROOT }}/deps \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=${{ env.OSXCROSS_ROOT }}/deps \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN }}
          
          make -j$(nproc) install

      - name: 📦 Pack Golden Image
        run: |
          cd /opt
          tar -cJf osxcross-golden-final.tar.xz osxcross/

      - name: 🚀 Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: golden-v7.0
          name: "Golden Toolchain V7 (Classic Zlib)"
          files: /opt/osxcross-golden-final.tar.xz
