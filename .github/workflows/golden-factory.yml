name: Golden_Toolchain_V13_Manual_Control

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1_Deployment_and_Inspection
        id: scout
        run: |
          # 1. Распаковка
          sudo mkdir -p /opt/toolchain
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C /opt/toolchain
          
          # 2. ПОИСК ИСТИНЫ (Составляем карту)
          echo "=== ОТЧЕТ ОБ ИНСПЕКЦИИ ==="
          BIN_PATH=$(sudo find /opt/toolchain -name "x86_64-apple-darwin19-clang" | head -n 1)
          SDK_PATH=$(sudo find /opt/toolchain -name "MacOSX10.15.sdk" -type d | head -n 1)
          
          if [ -z "$BIN_PATH" ] || [ -z "$SDK_PATH" ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Инструменты не найдены в /opt/toolchain"
            exit 1
          fi
          
          BIN_DIR=$(dirname "$BIN_PATH")
          # Проверяем наличие errno.h, чтобы убедиться, что SDK не "пустышка"
          ERRNO_H=$(sudo find "$SDK_PATH" -name "errno.h" | head -n 1)
          
          echo "КОМПИЛЯТОР: $BIN_PATH"
          echo "SDK_ROOT: $SDK_PATH"
          echo "ERRNO_H_FOUND: $ERRNO_H"
          echo "=========================="
          
          # Экспортируем точные пути для следующих шагов
          echo "X_BIN=$BIN_DIR" >> $GITHUB_ENV
          echo "X_SDK=$SDK_PATH" >> $GITHUB_ENV
          echo "X_TARGET=x86_64-apple-darwin19" >> $GITHUB_ENV
          
          sudo mkdir -p /opt/toolchain/deps
          sudo chown -R $USER:$USER /opt/toolchain

      - name: 2_Verify_Compiler_Search_Paths
        run: |
          # Просим компилятор показать, где он ищет хедеры на самом деле
          ${{ env.X_BIN }}/${{ env.X_TARGET }}-clang -target ${{ env.X_TARGET }} -isysroot ${{ env.X_SDK }} -v -E - < /dev/null 2>&1 | grep -A 10 "search starts here"

      - name: 3_Build_ZLIB_Hard_Manual
        run: |
          git clone --depth 1 https://github.com/madler/zlib.git zlib_src
          cd zlib_src
          
          # Мы не верим ./configure, потому что он может ошибиться в тестах.
          # Мы передаем всё в маке через переменные окружения и флаги.
          
          export CC="${{ env.X_BIN }}/${{ env.X_TARGET }}-clang"
          export AR="${{ env.X_BIN }}/${{ env.X_TARGET }}-ar"
          export RANLIB="${{ env.X_BIN }}/${{ env.X_TARGET }}-ranlib"
          
          # Ключевой момент: добавляем -isystem для принудительного включения инклудов SDK
          export CFLAGS="-O3 -target ${{ env.X_TARGET }} -isysroot ${{ env.X_SDK }} -isystem ${{ env.X_SDK }}/usr/include -mmacosx-version-min=10.13 -fPIC"
          
          # Запускаем конфиг, явно указав таргет. 
          # Если конфиг упадет - мы увидим почему в логе.
          ./configure --static --prefix=/opt/toolchain/deps
          
          make -j$(nproc)
          make install

      - name: 4_Build_LIBPNG
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git png_src
          mkdir -p png_src/build && cd png_src/build
          
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER="${{ env.X_BIN }}/${{ env.X_TARGET }}-clang" \
            -DCMAKE_C_FLAGS="-target ${{ env.X_TARGET }} -isysroot ${{ env.X_SDK }} -isystem ${{ env.X_SDK }}/usr/include -mmacosx-version-min=10.13" \
            -DCMAKE_INSTALL_PREFIX="/opt/toolchain/deps" \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF \
            -DZLIB_INCLUDE_DIR="/opt/toolchain/deps/include" \
            -DZLIB_LIBRARY="/opt/toolchain/deps/lib/libz.a"
            
          make -j$(nproc) install

      - name: 5_Pack_and_Release
        run: |
          cd /opt/toolchain
          tar -cJf ../osxcross-golden-v13.tar.xz .
          
      - name: 6_Publish
        uses: softprops/action-gh-release@v1
        with:
          tag_name: golden-v13.0
          name: "Golden Toolchain V13 (Hard Manual)"
          files: /opt/osxcross-golden-v13.tar.xz
