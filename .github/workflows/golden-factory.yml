name: Golden_Toolchain_V16_Manual_Steering

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 01_Unpack_and_Identify
        run: |
          sudo mkdir -p /opt/toolchain
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C /opt/toolchain
          
          # Находим точные пути к SDK и инструментам
          REAL_SDK=$(sudo find /opt/toolchain -name "MacOSX10.15.sdk" -type d | head -n 1)
          REAL_BIN=$(sudo find /opt/toolchain -name "x86_64-apple-darwin19-ld" -printf '%h' | head -n 1)
          
          echo "S_DIR=$REAL_SDK" >> $GITHUB_ENV
          echo "B_DIR=$REAL_BIN" >> $GITHUB_ENV
          sudo chown -R $USER:$USER /opt/toolchain

      - name: 02_Build_ZLIB_Direct
        run: |
          git clone --depth 1 https://github.com/madler/zlib.git zlib_src
          cd zlib_src
          
          # ВНИМАНИЕ: Мы НЕ используем x86_64-apple-darwin19-clang.
          # Мы используем системный clang, но объясняем ему, что делать.
          
          export CC="clang"
          export AR="${{ env.B_DIR }}/x86_64-apple-darwin19-ar"
          export RANLIB="${{ env.B_DIR }}/x86_64-apple-darwin19-ranlib"
          
          # -target: КТО мы
          # -isysroot: ГДЕ заголовки Apple
          # -fuse-ld: КАКИМ линковщиком пользоваться (важно!)
          export CFLAGS="-target x86_64-apple-darwin19 -isysroot ${{ env.S_DIR }} -fuse-ld=${{ env.B_DIR }}/x86_64-apple-darwin19-ld -O3 -mmacosx-version-min=10.13 -fPIC"
          
          ./configure --static --prefix=/opt/toolchain/deps
          make -j$(nproc)
          make install

      - name: 03_Build_LIBPNG_Direct
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git png_src
          mkdir -p png_src/build && cd png_src/build
          
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_C_FLAGS="-target x86_64-apple-darwin19 -isysroot ${{ env.S_DIR }} -fuse-ld=${{ env.B_DIR }}/x86_64-apple-darwin19-ld -mmacosx-version-min=10.13 -fPIC" \
            -DCMAKE_INSTALL_PREFIX="/opt/toolchain/deps" \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF \
            -DZLIB_INCLUDE_DIR="/opt/toolchain/deps/include" \
            -DZLIB_LIBRARY="/opt/toolchain/deps/lib/libz.a"
            
          make -j$(nproc) install

      - name: 04_Pack
        run: |
          cd /opt/toolchain
          tar -cJf ../osxcross-golden-v16.tar.xz .
          
      - name: 05_Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: golden-v16.0
          files: /opt/osxcross-golden-v16.tar.xz
