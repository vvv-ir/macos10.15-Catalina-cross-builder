name: Build_Real_OSXCROSS

on:
  workflow_dispatch: # Запускается кнопкой "Run workflow" вручную

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 01_Install_Dependencies
        run: |
          sudo apt-get update
          # Устанавливаем все пакеты, необходимые для сборки osxcross
          sudo apt-get install -y clang llvm-dev libxml2-dev uuid-dev libssl-dev bash patch make tar xz-utils bzip2 gzip sed cpio libbz2-dev zlib1g-dev

      - name: 02_Clone_OSXCROSS
        run: |
          git clone https://github.com/tpoechtrager/osxcross.git
          cd osxcross
          # Используем стабильную ветку
          git checkout master

      - name: 03_Download_Real_SDK
        run: |
          cd osxcross/tarballs
          # Скачиваем настоящий полный SDK 10.15 (весит ~80 МБ в архиве, внутри ~250 МБ "мяса")
          wget https://github.com/joseluisq/macosx-sdks/releases/download/10.15/MacOSX10.15.sdk.tar.xz

      - name: 04_Build_Toolchain
        run: |
          cd osxcross
          
          # UNATTENDED=1 отключает интерактивные вопросы скрипта
          export UNATTENDED=1
          # Ставим минимально поддерживаемую версию (для совместимости)
          export OSX_VERSION_MIN=10.13
          
          # Запускаем сборку
          ./build.sh
          
          echo "=== СБОРКА ЗАВЕРШЕНА ==="
          echo "Размер получившегося тулчейна:"
          du -sh target/

    
      
      - name: 05_Package_for_Release_FAT_VERSION
        run: |
          # 1. Переходим в папку с результатом сборки
          cd ${{ github.workspace }}/osxcross/target
          
          # 2. ПРОВЕРКА: Если здесь пусто, билд упадет прямо тут
          ls -R include | head -n 20 
          
          # 3. Упаковка с флагом -h (DEREFERENCE)
          # Этот флаг превращает все ссылки в реальные файлы. 
          # Архив станет тяжелее, но "честнее".
          tar -chf ../osxcross-fat.tar .
          
          # 4. Сжимаем (не на максимум, чтобы видеть реальный объем)
          xz -1 ../osxcross-fat.tar
          
          mv ../osxcross-fat.tar.xz ../../osxcross-universal-10.15-FULL.tar.xz

      - name: 06_Final_Check_Size
        run: |
          ls -lh osxcross-universal-10.15-FULL.tar.xz

      - name: 06_Create_Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: toolchain-v2.0-full
          name: "OSXCross 10.15 FULL (Real SDK)"
          body: |
            Полноценный рабочий тулчейн OSXCross.
            - SDK: MacOSX10.15
            - Min Version: 10.13
            - Содержит все системные заголовки (sys, machine и т.д.)
          files: osxcross-universal-10.15-FULL.tar.xz
          draft: false
